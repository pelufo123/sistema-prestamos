<!DOCTYPE html>
<html>
<head>
    <title>Clientes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h2>👥 Clientes</h2>

    <!-- 🔥 BOTONES DE NAVEGACIÓN -->
    <div style="margin-bottom:15px;">
        <a href="/" class="btn">🏠 Panel</a>
        <a href="/prestamos" class="btn">💰 Préstamos</a>
        <a href="/abonos" class="btn">💳 Abonos</a>
    </div>

    <!-- FORMULARIO -->
    <div class="card">
        <form method="POST">
            <input name="nombre" placeholder="Nombre" required>
            <input name="telefono" placeholder="Teléfono">
            <input name="direccion" placeholder="Dirección">
            <button>Guardar</button>
        </form>
    </div>

    <!-- LISTA -->
    <div class="card">
        <table>
            <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Capital Prestado</th>
                <th>Acciones</th>
            </tr>

            {% for c in clientes %}
            <tr>
                <td>{{ c[1] }}</td>
                <td>{{ c[2] }}</td>
                <td>{{ c[3] }}</td>
                <td>{{ formato(resumen[loop.index0]) }}</td>
                <td>
                    <a href="/editar_cliente/{{c[0]}}" class="btn btn-edit">✏️</a>
                    <a href="/eliminar_cliente/{{c[0]}}" class="btn btn-del">🗑️</a>
                    <a href="/historial/{{c[0]}}" class="btn btn-his">📄</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

<a class="btn" href="/">⬅ Volver</a>
</div>

</body>
</html>
