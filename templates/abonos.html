<h1>Abonos</h1>

<form method="POST">
    <select name="cliente">
        {% for c in clientes %}
        <option value="{{ c[0] }}">{{ c[1] }}</option>
        {% endfor %}
    </select>

    <input name="prestamo" placeholder="ID préstamo">
    <input name="monto" placeholder="Monto">

    <select name="tipo">
        <option value="capital">Capital</option>
        <option value="interes">Interés</option>
    </select>

    <button>Guardar</button>
</form>

<p>{{ mensaje }}</p>
