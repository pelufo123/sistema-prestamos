<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<!-- 🔥 BOTÓN SEGURO -->
<div style="margin-bottom:15px;">
    <a href="{{ url_for('panel') }}" class="btn">🏠 Inicio</a>
</div>

<h2>Abonos</h2>

<div class="card">
<form method="POST">

<select name="cliente" onchange="this.form.submit()">
    <option value="">Seleccione cliente</option>
    {% for c in clientes %}
    <option value="{{ c[0] }}" {% if cliente_id == c[0]|string %}selected{% endif %}>
        {{ c[1] }}
    </option>
    {% endfor %}
</select>

{% if prestamos %}
<select name="prestamo">
    {% for p in prestamos %}
    <option value="{{ p[0] }}">
        Préstamo #{{ p[0] }} - {{ p[1] }} - {{ p[2] }}
    </option>
    {% endfor %}
</select>
{% endif %}

<input name="monto" placeholder="Monto">

<select name="tipo">
    <option value="capital">Capital</option>
    <option value="interes">Interés</option>
</select>

<button>Guardar</button>

</form>
</div>

{% if mensaje %}
<div class="alert alert-warning">
{{ mensaje }}
</div>
{% endif %}

<a class="btn" href="/">Volver</a>

</div>

</body>
</html>
