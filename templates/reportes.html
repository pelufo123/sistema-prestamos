<!DOCTYPE html>
<html>
<head>
    <title>Reportes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>📊 Reportes</h2>

<form method="POST">
    <label>Seleccionar fecha:</label>
    <input type="date" name="fecha">
    <button type="submit">Ver</button>
</form>

<hr>

<div class="card">
    <h3>📅 Resultado del día</h3>
    <p>💵 Interés ganado: {{ interes_dia }}</p>
    <p>💰 Capital recuperado: {{ capital_dia }}</p>
</div>

<div class="card">
    <h3>📊 Totales generales</h3>
    <p>💵 Total interés: {{ interes_total }}</p>
    <p>💰 Total capital recuperado: {{ capital_total }}</p>
</div>

<br>

<a href="/">⬅ Volver al panel</a>

</body>
</html>
