<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h2>✏️ Editar Cliente</h2>

    <!-- 🔥 BOTONES DE NAVEGACIÓN -->
    <div style="margin-bottom:15px;">
        <a href="{{ url_for('panel') }}" class="btn">🏠 Inicio</a>
        <a href="{{ url_for('clientes') }}" class="btn">⬅️ Volver</a>
    </div>

    <div class="card">
        <form method="POST">
            <input name="nombre" value="{{ cliente[1] }}" required>
            <input name="telefono" value="{{ cliente[2] }}">
            <input name="direccion" value="{{ cliente[3] }}">
            <button>Guardar cambios</button>
        </form>
    </div>

</div>

</body>
</html>
