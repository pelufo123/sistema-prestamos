<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<h2>💰 Dashboard</h2>

<div class="card">
<form method="POST">
    <input type="date" name="fecha" value="{{ fecha }}">
    <button>Filtrar</button>
</form>
</div>

<div class="grid">
    <div class="card">
        <h3>Capital prestado</h3>
        <p>{{ capital_total }}</p>
    </div>

    <div class="card">
        <h3>Capital recogido</h3>
        <p>{{ capital_dia }}</p>
    </div>

    <div class="card">
        <h3>Interés recogido</h3>
        <p>{{ interes_dia }}</p>
    </div>
</div>

<div class="card">
    <a class="btn" href="/clientes">Clientes</a>
    <a class="btn" href="/prestamos">Préstamos</a>
    <a class="btn" href="/abonos">Abonos</a>
</div>

</div>

</body>
</html>
